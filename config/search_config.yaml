# 選區基本資訊
location:
  city: "桃園市"
  district: "八德區"
  
# Google News 搜尋關鍵字組合策略
news_keywords:
  # 核心關鍵字（必定會搜尋，加上雙引號以強制精確匹配）
  core:
    - '"{city}" "{district}"'           # "桃園市" "八德區"
    
  # 議題關鍵字（會與地區組合搜尋）
  issues:
    - "交通"
    - "治安"
    - "環境"
    - "停車"
    - "路平"
    - "學區"
    - "公園"
    - "市場"
    
  # 特殊關注（八德區特有議題，加上引號更精準）
  local_topics:
    - '"八德擴大都市計畫"'
    - '"捷運綠線" "八德"'
    - '"霄裡地區"'
