<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>新聞消息 — 八德資源網</title>
<meta name="description" content="八德資源網新聞消息，即時掌握八德區最新動態。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<style>
:root{--bg:#0b0f19;--cb:rgba(22,27,34,.65);--bd:rgba(255,255,255,.08);--p:#3b82f6;--pd:#2563eb;--pl:#60a5fa;--pg:rgba(59,130,246,.4);--cy:#22d3ee;--t1:#f8fafc;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--r:8px;--rm:12px;--rl:16px;--f:"Inter","Noto Sans TC",-apple-system,sans-serif}
*,*::before,*::after{box-sizing:border-box}
body{background:var(--bg);background-image:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(59,130,246,.12),transparent 60%);background-attachment:fixed;color:#e2e8f0;font-family:var(--f);font-size:16px;line-height:1.6;min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.navbar{background:rgba(11,15,25,.82)!important;backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:.75rem 0}
.navbar-brand{font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,#60a5fa,#22d3ee,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.nlp{color:var(--t2);text-decoration:none;font-size:.87rem;font-weight:500;padding:.36rem .82rem;border-radius:999px;border:1px solid transparent;transition:all .15s}
.nlp:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.nlp.on{color:var(--pl);background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3)}
.breadcrumb{background:transparent;padding:0;margin:0;font-size:.83rem}
.breadcrumb-item a{color:var(--t3);text-decoration:none;transition:color .15s}.breadcrumb-item a:hover{color:var(--pl)}
.breadcrumb-item.active{color:var(--t2)}.breadcrumb-item+.breadcrumb-item::before{color:var(--t4)}
.page-hd{padding:2.5rem 0 2rem;border-bottom:1px solid var(--bd);margin-bottom:2rem}
.ph-lbl{font-size:.72rem;font-weight:700;letter-spacing:2px;color:var(--p);text-transform:uppercase;margin-bottom:.5rem}
.ph-title{font-size:clamp(1.8rem,4vw,2.5rem);font-weight:800;color:var(--t1);letter-spacing:-.3px}
.ph-sub{color:var(--t3);font-size:.93rem;margin-top:.3rem}
.search-bar{display:flex;align-items:center;background:rgba(15,23,42,.8);border:1px solid var(--bd);border-radius:12px;padding:.6rem 1rem;transition:all .2s;gap:10px}
.search-bar:focus-within{border-color:rgba(59,130,246,.45);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.search-bar input{flex:1;background:transparent;border:none;color:#f8fafc;font-size:.95rem;outline:none;font-family:var(--f)}
.search-bar input::placeholder{color:var(--t4)}
.cat-tab{padding:.35rem 1rem;border-radius:999px;font-size:.84rem;font-weight:600;color:var(--t2);background:rgba(30,41,59,.6);border:1px solid var(--bd);cursor:pointer;transition:all .15s;font-family:var(--f)}
.cat-tab:hover{color:var(--t1);border-color:rgba(255,255,255,.2)}
.cat-tab.on{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 0 10px var(--pg)}
.month-sel{background:rgba(15,23,42,.7);border:1px solid var(--bd);color:#e2e8f0;border-radius:8px;padding:.35rem .7rem;font-size:.84rem;font-family:var(--f);cursor:pointer;outline:none;transition:all .15s}
.month-sel:focus{border-color:rgba(59,130,246,.4);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.ni{padding:1.1rem 1.3rem;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:background .12s;text-decoration:none;color:inherit}
.ni:hover{background:rgba(255,255,255,.025)}
.ni:last-child{border-bottom:none}
.src-badge{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;padding:.22rem .55rem;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;margin-top:2px}
.ni-title{font-size:.92rem;color:#e2e8f0;font-weight:500;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;transition:color .15s}
.ni:hover .ni-title{color:var(--pl)}
.ni-meta{font-size:.75rem;color:var(--t4);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pg-btn{min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);font-size:.87rem;font-weight:600;background:rgba(30,41,59,.6);border:1px solid var(--bd);color:var(--t2);cursor:pointer;padding:0 .5rem;transition:all .15s;font-family:var(--f)}
.pg-btn:hover:not(:disabled):not(.on){background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.35);color:var(--pl)}
.pg-btn.on{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 0 10px var(--pg)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
.skeleton{background:linear-gradient(90deg,rgba(30,41,59,.6) 25%,rgba(51,65,85,.6) 50%,rgba(30,41,59,.6) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>
<nav class="navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-tower-broadcast" style="-webkit-text-fill-color:#60a5fa"></i>八德資源網</a>
    <div class="d-flex align-items-center gap-1">
      <a href="/" class="nlp">首頁</a>
      <a href="/news" class="nlp">最新消息</a>
      <a href="/news-feed" class="nlp on">新聞消息</a>
      <a href="/wish" class="btn btn-sm btn-outline-primary rounded-pill px-3 ms-1" style="font-size:.83rem"><i class="fa-solid fa-wand-magic-sparkles me-1"></i>許願池</a>
    </div>
  </div>
</nav>

<div class="container">
  <nav aria-label="breadcrumb" style="padding:.8rem 0 0;font-size:.83rem">
    <ol class="breadcrumb mb-0"><li class="breadcrumb-item"><a href="/"><i class="fa-solid fa-house me-1"></i>首頁</a></li><li class="breadcrumb-item active">新聞消息</li></ol>
  </nav>

  <div class="page-hd">
    <div class="ph-lbl"><i class="fa-solid fa-newspaper me-1"></i>NEWS FEED</div>
    <h1 class="ph-title">新聞消息</h1>
    <p class="ph-sub">即時掌握八德區最新消息與動態</p>
  </div>

  <!-- Search + Filters -->
  <div class="mb-4">
    <div class="search-bar mb-3">
      <i class="fa-solid fa-magnifying-glass" style="color:var(--p);font-size:.9rem;flex-shrink:0"></i>
      <input type="text" id="q" placeholder="搜尋關鍵字、標題、議題...">
      <button id="btn-clear" style="display:none;background:transparent;border:none;color:var(--t4);cursor:pointer;padding:0;font-size:.9rem" onclick="clearSearch()"><i class="fa-solid fa-circle-xmark"></i></button>
    </div>
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <div id="src-tabs" class="d-flex flex-wrap gap-2">
        <button class="cat-tab on" data-src="all">全部消息</button>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <label style="font-size:.82rem;color:var(--t3)">月份：</label>
        <select class="month-sel" id="month-sel">
          <option value="all">全部時間</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div id="stats-bar" style="background:rgba(22,27,34,.4);border:1px solid var(--bd);border-radius:10px;padding:.7rem 1.1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:16px;flex-wrap:wrap;min-height:42px">
    <span style="font-size:.82rem;color:var(--t3)">載入中...</span>
  </div>

  <!-- News List -->
  <div style="background:var(--cb);border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;margin-bottom:2rem" id="news-list">
    <div class="skeleton" style="height:64px;border-radius:0;margin-bottom:1px"></div>
    <div class="skeleton" style="height:64px;border-radius:0;margin-bottom:1px"></div>
    <div class="skeleton" style="height:64px;border-radius:0;margin-bottom:1px"></div>
    <div class="skeleton" style="height:64px;border-radius:0;margin-bottom:1px"></div>
    <div class="skeleton" style="height:64px;border-radius:0"></div>
  </div>

  <!-- Pagination -->
  <div class="d-flex justify-content-center mb-4" id="pagination-wrap" style="display:none!important">
    <div class="d-flex align-items-center gap-2" id="pagination"></div>
  </div>
</div>

<script>
let currentPage=1,currentSource='all',currentMonth='all',currentSearch='',totalPages=1;
let searchTimer;

function formatDT(s){if(!s)return '';try{return new Date(s).toLocaleString('zh-TW',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});}catch(e){return s.substring(0,10);}}

function initMonthFilter(){
  const sel=document.getElementById('month-sel');
  for(let i=1;i<=12;i++){
    const opt=document.createElement('option');
    opt.value=`2026-${String(i).padStart(2,'0')}`;
    opt.textContent=`2026年 ${i}月`;
    sel.appendChild(opt);
  }
}

function srcBadge(p){return '';}

function postHtml(p){
  const meta=[];
  if(p.published_at)meta.push(`<span><i class="fa-regular fa-calendar me-1"></i>${formatDT(p.published_at)}</span>`);
  return `<a class="ni" href="${p.url}" target="_blank" rel="noopener">${srcBadge(p)}<div style="flex:1;min-width:0"><div class="ni-title">${p.title}</div><div class="ni-meta">${meta.join('')}</div></div><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:.7rem;color:var(--t4);flex-shrink:0;margin-top:4px"></i></a>`;
}

function buildPageRange(cur,total){
  if(total<=7)return Array.from({length:total},(_,i)=>i+1);
  const p=[];
  if(cur<=4){for(let i=1;i<=5;i++)p.push(i);p.push('...');p.push(total);}
  else if(cur>=total-3){p.push(1);p.push('...');for(let i=total-4;i<=total;i++)p.push(i);}
  else{p.push(1);p.push('...');for(let i=cur-1;i<=cur+1;i++)p.push(i);p.push('...');p.push(total);}
  return p;
}

function renderPagination(){
  const wrap=document.getElementById('pagination-wrap');
  if(totalPages<=1){wrap.style.display='none';return;}
  wrap.style.display='';
  let html=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}><i class="fa-solid fa-chevron-left"></i></button>`;
  buildPageRange(currentPage,totalPages).forEach(p=>{
    if(p==='...')html+=`<button class="pg-btn" style="cursor:default;opacity:.4">…</button>`;
    else html+=`<button class="pg-btn ${p===currentPage?'on':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}><i class="fa-solid fa-chevron-right"></i></button>`;
  document.getElementById('pagination').innerHTML=html;
}

function goPage(p){if(p<1||p>totalPages)return;currentPage=p;loadPosts();window.scrollTo({top:0,behavior:'smooth'});}

function clearSearch(){
  document.getElementById('q').value='';
  document.getElementById('btn-clear').style.display='none';
  currentSearch='';currentPage=1;loadPosts();
}

async function loadPosts(){
  const list=document.getElementById('news-list');
  list.innerHTML=Array(5).fill(0).map(()=>`<div class="skeleton" style="height:64px;border-radius:0;margin-bottom:1px"></div>`).join('');

  try{
    const params=new URLSearchParams({source:currentSource,month:currentMonth,q:currentSearch,page:currentPage,limit:20});
    const d=await fetch(`/api/posts?${params}`).then(r=>r.json());
    totalPages=d.total_pages||1;

    const statsBar=document.getElementById('stats-bar');
    statsBar.innerHTML=`<span style="font-size:.82rem;color:var(--t3)">共找到 <strong style="color:var(--pl)">${(d.total||0).toLocaleString()}</strong> 筆結果</span><span style="font-size:.82rem;color:var(--t3)">第 ${currentPage} / ${totalPages} 頁</span>`;

    if(!d.posts||!d.posts.length){
      list.innerHTML=`<div style="padding:3rem;text-align:center"><i class="fa-solid fa-box-open fs-1 mb-3 d-block text-secondary" style="opacity:.4"></i><h6 class="text-secondary">目前尚無符合條件的資料</h6></div>`;
      document.getElementById('pagination-wrap').style.display='none';return;
    }
    list.innerHTML=d.posts.map(postHtml).join('');
    renderPagination();
  }catch(e){
    list.innerHTML=`<div style="padding:3rem;text-align:center"><i class="fa-solid fa-triangle-exclamation fs-1 text-danger mb-3"></i><h6 class="text-danger">資料庫連線異常</h6></div>`;
  }
}

// Read ?q= from URL on load
function readUrlQ(){
  const params=new URLSearchParams(location.search);
  const q=params.get('q');
  if(q){document.getElementById('q').value=q;document.getElementById('btn-clear').style.display='';currentSearch=q;}
}

document.addEventListener('DOMContentLoaded',()=>{
  initMonthFilter();
  readUrlQ();

  document.querySelectorAll('#src-tabs .cat-tab').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('#src-tabs .cat-tab').forEach(b=>b.classList.remove('on'));
      this.classList.add('on');
      currentSource=this.dataset.src;currentPage=1;loadPosts();
    });
  });

  document.getElementById('month-sel').addEventListener('change',e=>{
    currentMonth=e.target.value;currentPage=1;loadPosts();
  });

  document.getElementById('q').addEventListener('input',e=>{
    clearTimeout(searchTimer);
    const v=e.target.value.trim();
    document.getElementById('btn-clear').style.display=v?'':'none';
    searchTimer=setTimeout(()=>{if(currentSearch!==v){currentSearch=v;currentPage=1;loadPosts();}},400);
  });

  loadPosts();
});
</script>
<!-- LINE 浮動按鈕 -->
<a href="#" id="line-fab" title="加 LINE 好友" target="_blank" rel="noopener" style="position:fixed;bottom:28px;right:24px;z-index:999;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:#06C755;color:#fff;text-decoration:none;border-radius:50%;box-shadow:0 4px 20px rgba(6,199,85,.5);transition:all .2s"><i class="fa-brands fa-line" style="font-size:1.6rem"></i></a>
<style>#line-fab:hover{background:#05a744!important;transform:scale(1.1);box-shadow:0 6px 28px rgba(6,199,85,.65)}</style>
</body>
</html>
