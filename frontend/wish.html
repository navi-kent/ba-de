<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>許願池 - 八德夢想家</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 27, 34, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 40%);
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .navbar {
            background: rgba(11, 15, 25, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .form-control, .form-control:focus {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: #e2e8f0;
            border-radius: 10px;
        }

        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.85);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-glow);
            color: #fff;
        }

        .form-control::placeholder { color: #475569; }

        .form-label {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        textarea.form-control { resize: vertical; min-height: 160px; }

        .btn-submit {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .char-count {
            font-size: 0.78rem;
            color: #475569;
            text-align: right;
            margin-top: 0.3rem;
            transition: color 0.2s;
        }
        .char-count.warning { color: #f59e0b; }
        .char-count.danger   { color: #ef4444; }

        .notice-box {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            font-size: 0.875rem;
            color: #93c5fd;
        }

        #result-box { display: none; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container">
        <a class="navbar-brand text-decoration-none fs-4" href="/">
            <i class="fa-solid fa-radar fa-spin-pulse me-2"></i>八德夢想家
        </a>
        <div class="d-flex align-items-center gap-2">
            <a href="/" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                <i class="fa-solid fa-arrow-left me-1"></i>返回首頁
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-2" style="max-width: 640px;">

    <!-- 標題區 -->
    <div class="text-center mb-5">
        <div style="font-size: 3.5rem; line-height: 1; margin-bottom: 1rem;">
            <i class="fa-solid fa-wand-magic-sparkles" style="background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
        </div>
        <h2 class="fw-bold mb-2">許願池</h2>
        <p class="text-secondary">告訴我們你希望這個平台新增什麼功能，<br>或者有什麼地方可以做得更好。</p>
    </div>

    <!-- 注意事項 -->
    <div class="notice-box mb-4">
        <i class="fa-solid fa-lock me-2"></i>
        你填寫的內容<strong>只有管理員看得到</strong>，不會公開顯示給其他用戶。
    </div>

    <!-- 表單 -->
    <div class="glass-card p-4 p-md-5">
        <form id="wish-form" novalidate>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">暱稱 <span class="text-secondary fw-normal">（選填）</span></label>
                    <input type="text" id="wish-name" class="form-control" placeholder="怎麼稱呼你？" maxlength="50">
                </div>
                <div class="col-md-6">
                    <label class="form-label">聯絡方式 <span class="text-secondary fw-normal">（選填）</span></label>
                    <input type="text" id="wish-contact" class="form-control" placeholder="Email 或 LINE ID" maxlength="100">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">許願內容 <span class="text-danger">*</span></label>
                <textarea id="wish-content" class="form-control" placeholder="例如：希望可以加入活動行事曆，讓居民知道最近有什麼社區活動..." maxlength="1000"></textarea>
                <div class="char-count" id="char-count">0 / 1000</div>
                <div class="invalid-feedback">請填寫許願內容</div>
            </div>

            <!-- 送出結果 -->
            <div id="result-box" class="mb-4 p-3 rounded-3 text-center fw-medium" role="alert"></div>

            <div class="d-grid">
                <button type="submit" class="btn btn-submit text-white" id="btn-submit">
                    <i class="fa-solid fa-paper-plane me-2"></i>送出許願
                </button>
            </div>

        </form>
    </div>

</div>

<script>
    const contentEl  = document.getElementById('wish-content');
    const charCount  = document.getElementById('char-count');
    const form       = document.getElementById('wish-form');
    const resultBox  = document.getElementById('result-box');
    const submitBtn  = document.getElementById('btn-submit');

    contentEl.addEventListener('input', () => {
        const len = contentEl.value.length;
        charCount.textContent = `${len} / 1000`;
        charCount.className = 'char-count' + (len > 900 ? ' danger' : len > 700 ? ' warning' : '');
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const content = contentEl.value.trim();
        if (!content) {
            contentEl.classList.add('is-invalid');
            contentEl.focus();
            return;
        }
        contentEl.classList.remove('is-invalid');

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>送出中...';
        resultBox.style.display = 'none';

        try {
            const res = await fetch('/api/wish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name:    document.getElementById('wish-name').value.trim(),
                    contact: document.getElementById('wish-contact').value.trim(),
                    content: content,
                })
            });
            const data = await res.json();

            if (data.ok) {
                resultBox.style.display = 'block';
                resultBox.className = 'mb-4 p-3 rounded-3 text-center fw-medium';
                resultBox.style.background = 'rgba(16, 185, 129, 0.12)';
                resultBox.style.border = '1px solid rgba(16, 185, 129, 0.3)';
                resultBox.style.color = '#6ee7b7';
                resultBox.innerHTML = '<i class="fa-solid fa-circle-check me-2"></i>許願已送出！感謝你的回饋，我們會認真考慮。';
                form.reset();
                charCount.textContent = '0 / 1000';
                charCount.className = 'char-count';
            } else {
                throw new Error(data.error || '送出失敗');
            }
        } catch (err) {
            resultBox.style.display = 'block';
            resultBox.className = 'mb-4 p-3 rounded-3 text-center fw-medium';
            resultBox.style.background = 'rgba(239, 68, 68, 0.12)';
            resultBox.style.border = '1px solid rgba(239, 68, 68, 0.3)';
            resultBox.style.color = '#fca5a5';
            resultBox.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-2"></i>${err.message}`;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>送出許願';
        }
    });
</script>

</body>
</html>
