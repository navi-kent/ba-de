<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八德夢想家</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 27, 34, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 40%);
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-bottom: 60px;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(11, 15, 25, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 1rem 0;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card {
            padding: 1.8rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--primary-glow);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .stat-icon {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-number {
            font-weight: 700;
            font-size: 2.5rem;
            color: #f8fafc;
            line-height: 1.2;
        }

        .post-card {
            padding: 1.5rem;
            margin-bottom: 1.2rem;
        }
        .post-card:hover {
            border-color: var(--primary-color);
            background: rgba(30, 41, 59, 0.7);
        }
        .post-title {
            color: #f8fafc;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.55;
            transition: color 0.2s;
            display: block;
        }
        .post-title:hover { color: #60a5fa; }

        .post-meta {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .custom-badge {
            padding: 0.3rem 0.7rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-source-news  { background: rgba(59,130,246,0.2);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.4); }
        .badge-source-ptt   { background: rgba(249,115,22,0.2);  color: #fdba74; border: 1px solid rgba(249,115,22,0.4); }
        .badge-source-dcard { background: rgba(2,132,199,0.2);   color: #7dd3fc; border: 1px solid rgba(2,132,199,0.4); }
        .badge-source-fb    { background: rgba(37,99,235,0.2);   color: #93c5fd; border: 1px solid rgba(37,99,235,0.4); }
        .badge-source-gov   { background: rgba(16,185,129,0.2);  color: #6ee7b7; border: 1px solid rgba(16,185,129,0.4); }

        .topic-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.4rem 1rem;
            margin: 0.3rem 0.2rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .topic-pill:hover, .topic-pill.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }
        .topic-count {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 2px 8px;
            margin-left: 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .month-pill {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border-color);
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .month-pill.wide { width: 48px; }
        .month-pill:hover, .month-pill.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            box-shadow: 0 0 10px var(--primary-glow);
            transform: translateY(-1px);
        }

        .filter-control {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            transition: all 0.3s ease;
        }
        .filter-control:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-glow);
            color: #fff;
        }
        .input-group-text {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-right: none;
            color: #94a3b8;
            border-radius: 10px 0 0 10px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container">
        <a class="navbar-brand text-decoration-none fs-4" href="/">
            <i class="fa-solid fa-tower-broadcast me-2"></i>八德夢想家
        </a>
        <div class="d-flex align-items-center gap-2">
            <div class="d-flex text-secondary align-items-center me-2" id="last-updated">
                <span class="spinner-grow spinner-grow-sm me-2 text-primary" role="status"></span>
                <small>連線中...</small>
            </div>
            <a href="/wish" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                <i class="fa-solid fa-wand-magic-sparkles me-1"></i>許願池
            </a>
            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="showBookmarkModal()">
                <i class="fa-regular fa-star me-1"></i>加入最愛
            </button>
        </div>
    </div>
</nav>

<!-- 書籤 Modal -->
<div class="modal fade" id="bookmarkModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:rgba(22,27,34,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:16px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">
                    <i class="fa-regular fa-star text-warning me-2"></i>加入瀏覽器書籤
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-3" id="bookmark-instructions"></div>
        </div>
    </div>
</div>

<div class="container mt-4 pt-2">

    <!-- 統計卡片 -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="glass-card stat-card text-center">
                <i class="fa-solid fa-database stat-icon"></i>
                <h3 id="stat-total" class="stat-number">--</h3>
                <p class="text-secondary mt-2 mb-0 fw-medium">資料庫總筆數</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-card stat-card text-center">
                <i class="fa-solid fa-bolt stat-icon" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;"></i>
                <h3 id="stat-today" class="stat-number">--</h3>
                <p class="text-secondary mt-2 mb-0 fw-medium">今日新增</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="glass-card stat-card">
                <h6 class="text-secondary fw-semibold mb-3 d-flex align-items-center">
                    <i class="fa-solid fa-chart-pie me-2 text-primary"></i>來源分佈
                </h6>
                <div id="stat-sources" class="small mt-2"></div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- 左側：篩選 + 文章列表 -->
        <div class="col-lg-8">
            <div class="glass-card p-4 mb-4">
                <h5 class="fw-bold mb-4 d-flex align-items-center">
                    <i class="fa-solid fa-filter me-2 text-primary"></i>篩選
                </h5>
                <div class="row g-3 align-items-center">
                    <div class="col-12 col-xl-6">
                        <div class="d-flex flex-wrap gap-2" id="month-filter-container"></div>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <select id="filter-source" class="form-select filter-control">
                            <option value="all">所有來源平台</option>
                            <option value="news">Google 新聞</option>
                            <option value="ptt">PTT</option>
                            <option value="dcard">Dcard</option>
                            <option value="fb">Facebook</option>
                            <option value="gov">政府公告</option>
                        </select>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" id="filter-search" class="form-control filter-control border-start-0" style="border-radius:0 10px 10px 0;" placeholder="搜尋關鍵字...">
                            <button class="btn btn-link text-secondary position-absolute end-0 top-50 translate-middle-y z-3" type="button" id="btn-clear-search" style="display:none;text-decoration:none;">
                                <i class="fa-solid fa-circle-xmark"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="posts-container">
                <div class="text-center text-secondary py-5" id="posts-loading">
                    <div class="spinner-border text-primary shadow-sm" role="status"></div>
                    <p class="mt-3 fw-medium">載入中...</p>
                </div>
            </div>

            <div class="text-center mt-4 mb-5">
                <button id="btn-load-more" class="btn btn-outline-primary px-5 py-2 rounded-pill fw-semibold shadow-sm" style="display:none;">載入更多</button>
            </div>
        </div>

        <!-- 右側：熱門議題 -->
        <div class="col-lg-4">
            <div class="glass-card sticky-lg-top" style="top:100px;max-height:calc(100vh - 130px);display:flex;flex-direction:column;">
                <div class="p-4 border-bottom flex-shrink-0" style="border-color:var(--border-color)!important;">
                    <h5 class="fw-bold mb-0 d-flex align-items-center text-primary">
                        <i class="fa-solid fa-fire-flame-curved me-2"></i>熱門議題
                    </h5>
                </div>
                <div class="card-body p-4" id="topics-container" style="overflow-y:auto;">
                    <div class="text-center text-secondary py-3">載入中...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPage = 1, currentSource = 'all', currentMonth = 'all';
    let currentTopic = 'all', currentSearch = '', isLoading = false;

    function formatDateTime(s) {
        if (!s) return '未知時間';
        try {
            return new Date(s).toLocaleString('zh-TW', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
        } catch(e) { return s; }
    }

    async function loadStats() {
        try {
            const data = await fetch('/api/stats').then(r => r.json());
            document.getElementById('stat-total').textContent = data.total.toLocaleString();
            document.getElementById('stat-today').textContent = data.today;

            if (data.last_updated) {
                document.getElementById('last-updated').innerHTML =
                    `<i class="fa-solid fa-clock-rotate-left me-2"></i><small>最新同步：${data.last_updated.substring(0,16)}</small>`;
            }

            document.getElementById('stat-sources').innerHTML = data.sources.map(s => `
                <div class="d-flex justify-content-between align-items-center mb-3" style="cursor:pointer;" onclick="setSource('${s.source}')">
                    <div>
                        <span class="custom-badge badge-source-${s.source} me-2 d-inline-block" style="width:12px;height:12px;padding:0;border-radius:50%;"></span>
                        <span class="text-light">${s.label}</span>
                    </div>
                    <span class="fw-bold text-primary">${s.cnt}</span>
                </div>`).join('') || '<div class="text-muted">無資料</div>';

            document.getElementById('topics-container').innerHTML = data.topics.map(t => {
                const kw = t.keyword ? t.keyword.replace(/^"|"$/g,'').trim() : '未分類';
                const sa = (t.keyword||'').replace(/"/g,'&quot;');
                return `<span class="topic-pill" data-topic="${sa}">${kw || '未分類'}<span class="topic-count">${t.cnt}</span></span>`;
            }).join('') || '<div class="text-muted text-center py-3">無資料</div>';

            document.querySelectorAll('.topic-pill[data-topic]').forEach(el =>
                el.addEventListener('click', function() { setTopic(this.dataset.topic, this); })
            );
        } catch(e) { console.error(e); }
    }

    function setSource(source) {
        document.getElementById('filter-source').value = source;
        currentSource = source; currentTopic = 'all'; currentPage = 1;
        loadPosts(true); window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setTopic(key, el) {
        document.getElementById('filter-search').value = '';
        document.getElementById('btn-clear-search').style.display = 'none';
        currentSearch = '';
        currentTopic = (currentTopic === key) ? 'all' : key;
        currentPage = 1;
        document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('active'));
        if (currentTopic !== 'all' && el) el.classList.add('active');
        loadPosts(true); window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function initMonthFilter() {
        const c = document.getElementById('month-filter-container');
        let html = `<div class="month-pill wide active" onclick="setMonth('all',this)">All</div>`;
        for (let i = 1; i <= 12; i++) {
            const v = `2026-${String(i).padStart(2,'0')}`;
            html += `<div class="month-pill" onclick="setMonth('${v}',this)" title="${i}月">${i}</div>`;
        }
        c.innerHTML = html;
    }

    function setMonth(v, el) {
        currentMonth = v; currentPage = 1;
        document.querySelectorAll('.month-pill').forEach(p => p.classList.remove('active'));
        if (el) el.classList.add('active');
        loadPosts(true);
    }

    function createPostHtml(post) {
        return `
        <div class="glass-card post-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="custom-badge badge-source-${post.source}">${post.source_label}</span>
                <span class="text-secondary small"><i class="fa-regular fa-calendar me-1"></i>${formatDateTime(post.published_at)}</span>
            </div>
            <a href="${post.url}" target="_blank" class="post-title">${post.title}</a>
            <div class="post-meta">
                <span><i class="fa-solid fa-hashtag text-primary me-1"></i><span class="text-light">${post.source_account ? post.source_account.replace(/^"|"$/g,'') : '綜合資訊'}</span></span>
                <span class="ms-auto" style="opacity:0.5;"><i class="fa-solid fa-cloud-arrow-down me-1"></i>收錄: ${post.scraped_at ? post.scraped_at.substring(5,10) : ''}</span>
            </div>
        </div>`;
    }

    async function loadPosts(reset = false) {
        if (isLoading) return;
        isLoading = true;
        const container = document.getElementById('posts-container');
        const btn = document.getElementById('btn-load-more');

        if (reset) {
            container.innerHTML = `<div class="text-center text-secondary py-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-3 fw-medium">載入中...</p></div>`;
            btn.style.display = 'none';
        }

        try {
            const params = new URLSearchParams({ source: currentSource, month: currentMonth, topic: currentTopic, q: currentSearch, page: currentPage, limit: 50 });
            const data = await fetch(`/api/posts?${params}`).then(r => r.json());

            if (reset) {
                container.innerHTML = '';
                if (!data.posts.length) {
                    container.innerHTML = `<div class="glass-card text-center py-5"><i class="fa-solid fa-box-open fs-1 mb-3 text-secondary" style="opacity:0.5;"></i><h5 class="text-secondary fw-medium">目前尚無符合的資料</h5></div>`;
                }
            }
            container.insertAdjacentHTML('beforeend', data.posts.map(createPostHtml).join(''));

            if (data.has_next) {
                btn.style.display = 'inline-block'; btn.disabled = false;
                btn.innerHTML = '載入更多 <i class="fa-solid fa-angle-down ms-1"></i>';
            } else {
                btn.style.display = 'none';
            }
        } catch(e) {
            console.error(e);
            if (reset) container.innerHTML = `<div class="glass-card text-center py-5"><i class="fa-solid fa-triangle-exclamation fs-1 text-danger mb-3"></i><h5 class="text-danger">資料庫連線異常</h5></div>`;
        } finally { isLoading = false; }
    }

    function showBookmarkModal() {
        const ua = navigator.userAgent, isMac = /Mac/.test(navigator.platform||ua);
        const isIOS = /iPhone|iPad|iPod/.test(ua), isAndroid = /Android/.test(ua);
        let html;
        if (isIOS) {
            html = `<p class="text-secondary mb-3">在 Safari 上加入書籤：</p><ol class="text-light" style="line-height:2;"><li>點底部 <i class="fa-solid fa-arrow-up-from-bracket text-primary"></i> 分享按鈕</li><li>選「加入書籤」或「加入主畫面」</li></ol>`;
        } else if (isAndroid) {
            html = `<p class="text-secondary mb-3">在 Chrome 上加入書籤：</p><ol class="text-light" style="line-height:2;"><li>點右上角 ⋮ 選單</li><li>選「加入書籤」</li></ol>`;
        } else {
            const key = isMac ? '⌘ Cmd + D' : 'Ctrl + D';
            html = `<p class="text-secondary mb-3 text-center">按下快捷鍵加入書籤</p><div class="text-center my-4"><kbd style="font-size:1.4rem;padding:0.5rem 1.2rem;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.5);border-radius:10px;color:#93c5fd;">${key}</kbd></div>`;
        }
        document.getElementById('bookmark-instructions').innerHTML = html;
        new bootstrap.Modal(document.getElementById('bookmarkModal')).show();
    }

    document.addEventListener('DOMContentLoaded', () => {
        initMonthFilter();
        loadStats();
        loadPosts(true);

        document.getElementById('filter-source').addEventListener('change', e => {
            currentSource = e.target.value; currentPage = 1; loadPosts(true);
        });

        let searchTimeout;
        const si = document.getElementById('filter-search');
        const cb = document.getElementById('btn-clear-search');
        si.addEventListener('input', e => {
            clearTimeout(searchTimeout);
            const v = e.target.value.trim();
            cb.style.display = v ? 'block' : 'none';
            searchTimeout = setTimeout(() => { if (currentSearch !== v) { currentSearch = v; currentPage = 1; loadPosts(true); } }, 400);
        });
        cb.addEventListener('click', () => { si.value = ''; cb.style.display = 'none'; currentSearch = ''; currentPage = 1; loadPosts(true); });

        const btn = document.getElementById('btn-load-more');
        new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && !isLoading && !btn.disabled && btn.style.display !== 'none') {
                btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>載入中...'; currentPage++; loadPosts();
            }
        }, { rootMargin: '200px' }).observe(btn);
        btn.addEventListener('click', () => { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>載入中...'; currentPage++; loadPosts(); });
    });
</script>
</body>
</html>
