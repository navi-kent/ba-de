<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>八德資源網 — 桃園市八德區地方資訊平台</title>
<meta name="description" content="八德資源網，整合八德區最新消息、在地新聞、政府公告，讓居民快速掌握區域動態。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<style>
:root{--bg:#0b0f19;--cb:rgba(22,27,34,.65);--bd:rgba(255,255,255,.08);--p:#3b82f6;--pd:#2563eb;--pl:#60a5fa;--pg:rgba(59,130,246,.4);--cy:#22d3ee;--gn:#34d399;--yw:#fbbf24;--t1:#f8fafc;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--r:8px;--rm:12px;--rl:16px;--f:"Inter","Noto Sans TC",-apple-system,sans-serif}
*,*::before,*::after{box-sizing:border-box}
body{background:var(--bg);background-image:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(59,130,246,.13),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 5%,rgba(52,211,153,.06),transparent 50%);background-attachment:fixed;color:#e2e8f0;font-family:var(--f);font-size:16px;line-height:1.6;min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.navbar{background:rgba(11,15,25,.82)!important;backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:.75rem 0}
.navbar-brand{font-weight:800;font-size:1.15rem;background:linear-gradient(135deg,#60a5fa,#22d3ee,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.2px;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.nlp{color:var(--t2);text-decoration:none;font-size:.88rem;font-weight:500;padding:.38rem .85rem;border-radius:999px;border:1px solid transparent;transition:all .15s;display:inline-flex;align-items:center;gap:.3rem}
.nlp:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.nlp.on{color:var(--pl);background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3)}
@keyframes tk{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-bar{background:linear-gradient(90deg,rgba(15,23,42,.98),rgba(11,15,25,.98));border-bottom:1px solid rgba(59,130,246,.2);height:42px;overflow:hidden;display:flex;align-items:center}
.ticker-lbl{flex-shrink:0;background:var(--p);color:#fff;font-size:.7rem;font-weight:700;letter-spacing:1px;padding:.25rem .8rem;border-radius:0 6px 6px 0;white-space:nowrap}
.ticker-wrap{flex:1;overflow:hidden}
.ticker-track{display:flex;align-items:center;height:42px;white-space:nowrap;animation:tk 40s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.ti{display:inline-flex;align-items:center;font-size:.84rem;color:#cbd5e1;padding:0 1.5rem;gap:.5rem;text-decoration:none;transition:color .15s}
.ti:hover{color:var(--pl)}
.hero{padding:4rem 0 2.5rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(59,130,246,.18) 0%,rgba(52,211,153,.07) 40%,transparent 70%);pointer-events:none;animation:hg 8s ease-in-out infinite alternate}
@keyframes hg{0%{opacity:.6;transform:translateX(-50%) scale(1)}100%{opacity:1;transform:translateX(-50%) scale(1.08)}}
.hero-title{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:800;letter-spacing:-1px;line-height:1.15;background:linear-gradient(135deg,#60a5fa,#22d3ee 40%,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1}
.hero-sub{color:var(--t2);font-size:1.05rem;margin-top:.7rem;position:relative;z-index:1}
.vc-pill{display:inline-flex;align-items:center;gap:.6rem;margin-top:1.2rem;background:rgba(15,23,42,.7);border:1px solid rgba(59,130,246,.25);border-radius:30px;padding:.45rem 1.2rem;font-size:.88rem;color:var(--t3)}
.gc{background:var(--cb);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:var(--rl);transition:all .25s}
.gc:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 20px rgba(59,130,246,.18);border-color:rgba(255,255,255,.16)}
.sc{padding:1.8rem;text-align:center;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#3b82f6,#22d3ee,#34d399);opacity:0;transition:opacity .25s}
.gc:hover .sc::before{opacity:1}
.sc-icon{font-size:2rem;margin-bottom:.7rem;background:linear-gradient(135deg,#60a5fa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:all .25s}
.gc:hover .sc-icon{transform:scale(1.08)}
.sc-num{font-size:2.4rem;font-weight:800;color:var(--t1);letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1.2}
.nc{background:var(--cb);border:1px solid var(--bd);border-radius:var(--rm);overflow:hidden;display:flex;flex-direction:column;height:100%;transition:all .25s}
.nc:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,.4),0 0 20px rgba(59,130,246,.2);border-color:rgba(59,130,246,.4)}
.nc-img{width:100%;height:180px;background:linear-gradient(135deg,rgba(30,41,59,.9),rgba(15,23,42,.9));display:flex;align-items:center;justify-content:center;overflow:hidden}
.nc-img img{width:100%;height:100%;object-fit:cover}
.nc-body{padding:1.15rem;display:flex;flex-direction:column;flex:1}
.cat-badge{display:inline-block;font-size:.68rem;font-weight:700;padding:.22rem .65rem;border-radius:6px;background:rgba(59,130,246,.15);color:var(--pl);border:1px solid rgba(59,130,246,.3);text-transform:uppercase;letter-spacing:.5px}
.nc-title{font-size:.97rem;font-weight:600;color:var(--t1);line-height:1.55;margin:.5rem 0 .4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-decoration:none;transition:color .15s}
.nc-title:hover{color:var(--pl)}
.nc-sum{font-size:.83rem;color:var(--t3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;margin-bottom:.4rem}
.nc-foot{margin-top:auto;padding-top:.75rem;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.nc-date{font-size:.76rem;color:var(--t4)}
.nc-link{font-size:.78rem;color:var(--p);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:all .15s}
.nc-link:hover{color:var(--pl);gap:.5rem}
.btn-p{background:var(--p);color:#fff;border:none;padding:.55rem 1.3rem;border-radius:var(--r);font-weight:600;font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:all .15s;text-decoration:none;font-family:var(--f)}
.btn-p:hover{background:var(--pd);color:#fff;transform:translateY(-2px);box-shadow:0 4px 15px var(--pg)}
.btn-o{background:transparent;color:var(--t2);border:1px solid rgba(255,255,255,.15);padding:.55rem 1.3rem;border-radius:var(--r);font-weight:500;font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:all .15s;text-decoration:none;font-family:var(--f)}
.btn-o:hover{color:var(--t1);border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.04)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.sh-t{font-size:1.1rem;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:10px}
.cta-card{padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.skeleton{background:linear-gradient(90deg,rgba(30,41,59,.6) 25%,rgba(51,65,85,.6) 50%,rgba(30,41,59,.6) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>

<div class="ticker-bar" id="ticker-bar">
  <span class="ticker-lbl"><i class="fa-solid fa-rss me-1"></i>即時</span>
  <div class="ticker-wrap">
    <div class="ticker-track" id="ticker-track">
      <span class="ti" style="color:var(--t3)">資料載入中...</span>
    </div>
  </div>
</div>

<nav class="navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-tower-broadcast" style="-webkit-text-fill-color:#60a5fa"></i>八德資源網</a>
    <div class="d-flex align-items-center gap-1 flex-wrap">
      <button onclick="toggleSearch()" style="background:transparent;border:1px solid var(--bd);color:var(--t2);width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-right:4px" onmouseover="this.style.borderColor='rgba(59,130,246,.4)';this.style.color='#3b82f6'" onmouseout="this.style.borderColor='var(--bd)';this.style.color='var(--t2)'">
        <i class="fa-solid fa-magnifying-glass" style="font-size:.82rem"></i>
      </button>
      <a href="/" class="nlp on">首頁</a>
      <a href="/news" class="nlp">最新消息</a>
      <a href="/news-feed" class="nlp">新聞消息</a>
      <a href="/wish" class="btn btn-sm btn-outline-primary rounded-pill px-3 ms-1" style="font-size:.84rem"><i class="fa-solid fa-wand-magic-sparkles me-1"></i>許願池</a>
      <button onclick="showBM()" class="btn btn-sm btn-outline-secondary rounded-pill px-3" style="font-size:.84rem"><i class="fa-regular fa-star me-1"></i>加入最愛</button>
    </div>
  </div>
</nav>

<!-- Search Overlay -->
<div id="search-ov" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(7,11,20,.92);backdrop-filter:blur(24px);align-items:flex-start;justify-content:center;padding-top:130px">
  <div style="width:100%;max-width:600px;padding:0 20px">
    <div style="display:flex;align-items:center;background:rgba(15,23,42,.95);border:1px solid rgba(59,130,246,.45);border-radius:16px;padding:.7rem 1.1rem;box-shadow:0 0 0 4px rgba(59,130,246,.12)">
      <i class="fa-solid fa-magnifying-glass" style="color:#3b82f6;margin-right:12px;font-size:1rem"></i>
      <input id="si" type="text" placeholder="搜尋新聞、公告、議題..." style="flex:1;background:transparent;border:none;color:#f8fafc;font-size:1rem;outline:none;font-family:var(--f)" onkeydown="if(event.key==='Enter'&&this.value.trim())window.location='/news-feed?q='+encodeURIComponent(this.value.trim())">
      <kbd style="font-size:.72rem;color:var(--t3);background:rgba(30,41,59,.8);border:1px solid var(--bd);border-radius:5px;padding:2px 7px;font-family:var(--f)">Esc</kbd>
    </div>
    <div style="margin-top:10px;text-align:center;font-size:12px;color:var(--t4)">按 Esc 關閉搜尋</div>
  </div>
</div>

<!-- Bookmark Modal -->
<div class="modal fade" id="bmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="background:rgba(22,27,34,.97);border:1px solid rgba(255,255,255,.1);border-radius:16px">
      <div class="modal-header border-0 pb-0"><h5 class="modal-title fw-bold fs-6"><i class="fa-regular fa-star text-warning me-2"></i>加入瀏覽器書籤</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body text-center py-3" id="bm-body"></div>
    </div>
  </div>
</div>

<div class="container">

  <div class="hero text-center">
    <h1 class="hero-title"><i class="fa-solid fa-tower-broadcast me-2" style="-webkit-text-fill-color:#60a5fa;font-size:.8em"></i>八德資源網</h1>
    <p class="hero-sub">桃園市八德區在地資訊平台，掌握最新動態</p>
    <div class="vc-pill d-inline-flex">
      <i class="fa-solid fa-users" style="color:var(--p);font-size:.9rem"></i>
      <span id="vc" style="font-variant-numeric:tabular-nums;font-weight:700;font-size:1rem;color:#93c5fd;letter-spacing:.5px;min-width:3ch">--</span>
      <span style="color:var(--t4);font-size:.82rem">人已瀏覽</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="row g-4 mb-5">
    <div class="col-md-6"><div class="gc sc"><i class="fa-solid fa-database sc-icon"></i><div class="sc-num" id="s1">--</div><p class="text-secondary mt-2 mb-0 fw-medium" style="font-size:.9rem">資料庫總筆數</p></div></div>
    <div class="col-md-6"><div class="gc sc"><i class="fa-solid fa-bolt sc-icon" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text"></i><div class="sc-num" id="s2">--</div><p class="text-secondary mt-2 mb-0 fw-medium" style="font-size:.9rem">今日新增</p></div></div>
  </div>
  <div id="source-dist" style="display:none"></div>

  <!-- Latest News -->
  <div class="sh">
    <h2 class="sh-t fw-bold mb-0"><span style="width:4px;height:20px;background:var(--p);border-radius:2px;display:inline-block"></span>最新消息</h2>
    <a href="/news" class="btn-o" style="font-size:.84rem;padding:.45rem 1rem">查看全部 <i class="fa-solid fa-arrow-right"></i></a>
  </div>
  <div class="row g-4 mb-5" id="news-preview">
    <div class="col-md-4"><div class="nc"><div class="nc-img"><div class="skeleton" style="width:100%;height:100%"></div></div><div class="nc-body"><div class="skeleton" style="height:12px;width:50px;margin-bottom:8px"></div><div class="skeleton" style="height:16px;margin-bottom:6px"></div><div class="skeleton" style="height:16px;width:80%"></div></div></div></div>
    <div class="col-md-4"><div class="nc"><div class="nc-img"><div class="skeleton" style="width:100%;height:100%"></div></div><div class="nc-body"><div class="skeleton" style="height:12px;width:50px;margin-bottom:8px"></div><div class="skeleton" style="height:16px;margin-bottom:6px"></div><div class="skeleton" style="height:16px;width:80%"></div></div></div></div>
    <div class="col-md-4"><div class="nc"><div class="nc-img"><div class="skeleton" style="width:100%;height:100%"></div></div><div class="nc-body"><div class="skeleton" style="height:12px;width:50px;margin-bottom:8px"></div><div class="skeleton" style="height:16px;margin-bottom:6px"></div><div class="skeleton" style="height:16px;width:80%"></div></div></div></div>
  </div>

  <!-- External News -->
  <div class="sh">
    <h2 class="sh-t fw-bold mb-0"><span style="width:4px;height:20px;background:var(--cy);border-radius:2px;display:inline-block"></span>新聞消息</h2>
    <a href="/news-feed" class="btn-o" style="font-size:.84rem;padding:.45rem 1rem">更多新聞 <i class="fa-solid fa-arrow-right"></i></a>
  </div>
  <div class="gc mb-5" style="padding:0;overflow:hidden" id="ext-news">
    <div class="skeleton" style="height:54px;border-radius:0;margin-bottom:1px"></div>
    <div class="skeleton" style="height:54px;border-radius:0;margin-bottom:1px"></div>
    <div class="skeleton" style="height:54px;border-radius:0"></div>
    <div style="padding:.7rem 1.2rem;text-align:center;border-top:1px solid rgba(255,255,255,.04)"><a href="/news-feed" style="font-size:.82rem;color:var(--p);font-weight:600;text-decoration:none">查看全部新聞消息 →</a></div>
  </div>

  <!-- Map -->
  <div class="sh">
    <h2 class="sh-t fw-bold mb-0"><span style="width:4px;height:20px;background:var(--gn);border-radius:2px;display:inline-block"></span>八德區地圖</h2>
  </div>
  <div style="border-radius:var(--rl);overflow:hidden;border:1px solid var(--bd);aspect-ratio:16/9;margin-bottom:2.5rem">
    <iframe src="https://maps.google.com/maps?q=桃園市八德區&z=14&output=embed&hl=zh-TW" style="width:100%;height:100%;border:0" allowfullscreen loading="lazy" title="八德區地圖"></iframe>
  </div>

  <!-- CTA Pair -->
  <div class="row g-4 mb-4">
    <div class="col-md-6"><div class="gc cta-card"><div><div class="d-flex align-items-center gap-2 mb-1"><i class="fa-solid fa-newspaper" style="color:var(--p);font-size:1.1rem"></i><h6 class="mb-0 fw-bold">新聞消息</h6></div><p class="text-secondary small mb-0">即時蒐集八德區最新新聞與動態</p></div><a href="/news-feed" class="btn-p" style="white-space:nowrap;flex-shrink:0">前往瀏覽 <i class="fa-solid fa-arrow-right"></i></a></div></div>
    <div class="col-md-6"><div class="gc cta-card"><div><div class="d-flex align-items-center gap-2 mb-1"><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--p);font-size:1.1rem"></i><h6 class="mb-0 fw-bold">許願池</h6></div><p class="text-secondary small mb-0">有任何建議或希望平台提供的功能，歡迎告訴我們</p></div><a href="/wish" class="btn-o" style="white-space:nowrap;flex-shrink:0">前往許願 <i class="fa-solid fa-arrow-right"></i></a></div></div>
  </div>

</div>

<script>
function fmtDate(s){if(!s)return '';try{return new Date(s).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});}catch(e){return s.substring(0,10);}}

function toggleSearch(){const o=document.getElementById('search-ov');const on=o.style.display==='flex';o.style.display=on?'none':'flex';if(!on)setTimeout(()=>document.getElementById('si').focus(),50);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('search-ov').style.display='none';});
document.getElementById('search-ov').addEventListener('click',function(e){if(e.target===this)this.style.display='none';});

function showBM(){
  const ua=navigator.userAgent,isMac=/Mac/.test(navigator.platform||ua),isIOS=/iPhone|iPad|iPod/.test(ua),isAndroid=/Android/.test(ua);
  let b;
  if(isIOS)b=`<div class="text-center py-2"><i class="fa-solid fa-arrow-up-from-bracket" style="font-size:2.5rem;color:#3b82f6;margin-bottom:1rem;display:block"></i><p class="text-light fw-semibold mb-1">點底部分享按鈕</p><p class="text-secondary small">然後選「加入書籤」或「加入主畫面」</p></div>`;
  else if(isAndroid)b=`<div class="text-center py-2"><i class="fa-solid fa-ellipsis-vertical" style="font-size:2.5rem;color:#3b82f6;margin-bottom:1rem;display:block"></i><p class="text-light fw-semibold mb-1">點右上角 ⋮ 選單</p><p class="text-secondary small">然後選「加入書籤」</p></div>`;
  else{const k=isMac?'⌘ Cmd + D':'Ctrl + D';b=`<div class="text-center py-2"><p class="text-secondary small mb-3">瀏覽器不允許程式直接觸發書籤，請按快捷鍵：</p><kbd style="display:inline-block;font-size:1.8rem;padding:.6rem 1.8rem;background:rgba(59,130,246,.15);border:2px solid rgba(59,130,246,.5);border-radius:14px;color:#93c5fd;font-family:inherit;letter-spacing:1px;cursor:pointer" onclick="this.style.transform='scale(.95)';setTimeout(()=>this.style.transform='',150)">${k}</kbd></div>`;}
  document.getElementById('bm-body').innerHTML=b;
  new bootstrap.Modal(document.getElementById('bmModal')).show();
}

function cnt(el,target,dur){const t0=performance.now();(function step(now){const p=Math.min((now-t0)/dur,1);el.textContent=Math.floor((1-Math.pow(1-p,3))*target).toLocaleString();if(p<1)requestAnimationFrame(step);else el.textContent=target.toLocaleString();})(t0);}

async function loadTicker(){
  try{
    const items=await fetch('/api/ticker').then(r=>r.json());
    if(!items.length){document.getElementById('ticker-bar').style.display='none';return;}
    const html=items.map(it=>`<a class="ti" href="${it.url}" target="_blank" rel="noopener"><span style="color:rgba(59,130,246,.5);font-size:.5rem">●</span>${it.title}</a>`).join('');
    const track=document.getElementById('ticker-track');
    track.innerHTML=html+html;
    const totalChars=items.reduce((a,b)=>a+b.title.length,0);
    const dur=Math.max(30,Math.min(120,totalChars*.08));
    track.style.animation=`tk ${dur}s linear infinite`;
  }catch(e){document.getElementById('ticker-bar').style.display='none';}
}

async function loadStats(){
  try{
    const d=await fetch('/api/stats').then(r=>r.json());
    setTimeout(()=>{cnt(document.getElementById('s1'),d.total,1500);cnt(document.getElementById('s2'),d.today,800);},400);
    const sources=d.sources||[];
    const total=sources.reduce((a,b)=>a+b.cnt,0)||1;
    const colors=['#facc15','#22d3ee','#a78bfa','#fb7185','#34d399'];
    document.getElementById('source-dist').innerHTML=sources.map((s,i)=>{
      const pct=Math.round(s.cnt/total*100);
      const c=colors[i%colors.length];
      return `<div class="d-flex justify-content-between align-items-center"><div style="display:flex;align-items:center;gap:6px"><span style="width:7px;height:7px;border-radius:50%;background:${c};display:inline-block"></span><span class="small text-light">${s.label}</span></div><span class="fw-bold" style="color:#60a5fa;font-size:.9rem">${s.cnt.toLocaleString()}</span></div><div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:6px"><div style="height:4px;background:${c};border-radius:2px;width:${pct}%"></div></div>`;
    }).join('')||'<div class="text-secondary small">無資料</div>';
  }catch(e){document.getElementById('s1').textContent='--';document.getElementById('s2').textContent='--';}
}

async function recordVisit(){
  try{
    const d=await fetch('/api/visit',{method:'POST'}).then(r=>r.json());
    if(d.ok)setTimeout(()=>cnt(document.getElementById('vc'),d.total,1200),400);
  }catch(e){}
}

async function loadNewsPreview(){
  try{
    const d=await fetch('/api/announcements?limit=3').then(r=>r.json());
    const c=document.getElementById('news-preview');
    if(!d.items||!d.items.length){c.innerHTML=`<div class="col-12 text-center text-secondary py-4">目前尚無最新消息</div>`;return;}
    c.innerHTML=d.items.map(it=>{
      const img=it.cover_image?`<div class="nc-img"><img src="${it.cover_image}" alt="${it.title}" loading="lazy"></div>`:`<div class="nc-img"><i class="fa-regular fa-image" style="font-size:2rem;color:rgba(255,255,255,.15)"></i></div>`;
      return `<div class="col-md-4"><div class="nc">${img}<div class="nc-body"><span class="cat-badge">${it.category||'一般'}</span><a href="/news/${it.slug}" class="nc-title d-block">${it.title}</a>${it.summary?`<p class="nc-sum">${it.summary}</p>`:''}<div class="nc-foot"><span class="nc-date"><i class="fa-regular fa-calendar me-1"></i>${fmtDate(it.published_at)}</span><a href="/news/${it.slug}" class="nc-link">閱讀全文 <i class="fa-solid fa-arrow-right"></i></a></div></div></div></div>`;
    }).join('');
  }catch(e){document.getElementById('news-preview').innerHTML=`<div class="col-12 text-center text-secondary py-4">載入失敗</div>`;}
}

async function loadExternalNews(){
  try{
    const d=await fetch('/api/posts?page=1&limit=3').then(r=>r.json());
    const block=document.getElementById('ext-news');
    if(!d.posts||!d.posts.length){block.innerHTML=`<div style="padding:1.2rem;text-align:center;color:var(--t3);font-size:.9rem">目前尚無外部新聞</div><div style="padding:.7rem 1.2rem;text-align:center;border-top:1px solid rgba(255,255,255,.04)"><a href="/news-feed" style="font-size:.82rem;color:var(--p);font-weight:600;text-decoration:none">查看全部新聞消息 →</a></div>`;return;}
    const rows=d.posts.map(p=>`<a href="${p.url}" target="_blank" rel="noopener" style="padding:.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;text-decoration:none;color:inherit" onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background='transparent'"><div style="flex:1"><div style="font-size:.9rem;color:#e2e8f0;font-weight:500;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical">${p.title}</div><div style="font-size:.74rem;color:var(--t4);margin-top:2px">${p.published_at?p.published_at.substring(0,10):''}</div></div><i class="fa-solid fa-arrow-up-right-from-square" style="font-size:.7rem;color:var(--t4);flex-shrink:0"></i></a>`).join('');
    block.innerHTML=rows+`<div style="padding:.7rem 1.2rem;text-align:center;border-top:1px solid rgba(255,255,255,.04)"><a href="/news-feed" style="font-size:.82rem;color:var(--p);font-weight:600;text-decoration:none">查看全部新聞消息 →</a></div>`;
  }catch(e){document.getElementById('ext-news').innerHTML=`<div style="padding:1rem;text-align:center;color:var(--t3);font-size:.9rem">載入失敗</div><div style="padding:.7rem 1.2rem;text-align:center"><a href="/news-feed" style="font-size:.82rem;color:var(--p);font-weight:600;text-decoration:none">查看全部新聞消息 →</a></div>`;}
}

document.addEventListener('DOMContentLoaded',()=>{
  recordVisit();loadTicker();loadStats();loadNewsPreview();loadExternalNews();
});
</script>
