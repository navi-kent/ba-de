<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">最新消息 — 八德資源網</title>
<meta name="description" id="page-desc" content="八德資源網最新消息">
<meta property="og:type" content="article">
<meta property="og:site_name" content="八德資源網">
<meta property="og:title" id="og-title" content="">
<meta property="og:description" id="og-desc" content="">
<meta property="og:image" id="og-image" content="">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<style>
:root{--bg:#0b0f19;--cb:rgba(22,27,34,.65);--bd:rgba(255,255,255,.08);--p:#3b82f6;--pl:#60a5fa;--t1:#f8fafc;--t2:#94a3b8;--t3:#64748b;--t4:#475569;--rl:16px;--f:"Inter","Noto Sans TC",-apple-system,sans-serif}
*,*::before,*::after{box-sizing:border-box}
body{background:var(--bg);background-image:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(59,130,246,.1),transparent 60%);background-attachment:fixed;color:#e2e8f0;font-family:var(--f);font-size:16px;line-height:1.6;min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.navbar{background:rgba(11,15,25,.82)!important;backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:.75rem 0}
.navbar-brand{font-weight:800;font-size:1.1rem;background:linear-gradient(135deg,#60a5fa,#22d3ee,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.nlp{color:var(--t2);text-decoration:none;font-size:.87rem;font-weight:500;padding:.36rem .82rem;border-radius:999px;border:1px solid transparent;transition:all .15s}
.nlp:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.nlp.on{color:var(--pl);background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3)}
.breadcrumb{background:transparent;padding:0;margin:0;font-size:.83rem}
.breadcrumb-item a{color:var(--t3);text-decoration:none;transition:color .15s}.breadcrumb-item a:hover{color:var(--pl)}
.breadcrumb-item.active{color:var(--t2)}.breadcrumb-item+.breadcrumb-item::before{color:var(--t4)}
.gc{background:var(--cb);backdrop-filter:blur(12px);border:1px solid var(--bd);border-radius:var(--rl)}
.cat-badge{display:inline-block;font-size:.68rem;font-weight:700;padding:.22rem .65rem;border-radius:6px;background:rgba(59,130,246,.15);color:var(--pl);border:1px solid rgba(59,130,246,.3);text-transform:uppercase;letter-spacing:.5px}
.art-cover{width:100%;height:320px;background:linear-gradient(135deg,rgba(30,41,59,.95),rgba(15,23,42,.95));display:flex;align-items:center;justify-content:center;border-radius:var(--rl);overflow:hidden;margin-bottom:2rem}
.art-cover img{width:100%;height:100%;object-fit:cover}
.art-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;color:var(--t1);line-height:1.25;letter-spacing:-.2px;margin:1rem 0 .75rem}
.art-meta{display:flex;align-items:center;flex-wrap:wrap;gap:16px;font-size:.84rem;color:var(--t3);padding:.9rem 0;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);margin-bottom:2rem}
.art-body{font-size:1rem;line-height:1.9;color:#cbd5e1;max-width:720px}
.art-body p{margin-bottom:1.2rem}
.art-body h1,.art-body h2{color:var(--t1);font-weight:700;margin:2rem 0 .8rem}
.art-body h2{font-size:1.3rem;padding-left:1rem;border-left:3px solid var(--p)}
.art-body h3{font-size:1.1rem;font-weight:600;color:var(--t1);margin:1.5rem 0 .6rem}
.art-body ul,.art-body ol{padding-left:1.4rem;margin-bottom:1.2rem}
.art-body li{margin-bottom:.5rem}
.art-body strong{color:var(--t1);font-weight:600}
.art-body a{color:#60a5fa;text-decoration:none;border-bottom:1px solid rgba(96,165,250,.3)}
.art-body a:hover{border-color:#60a5fa}
.art-body img{max-width:100%;border-radius:10px;margin:1rem 0}
.art-body blockquote{border-left:3px solid var(--p);padding:.8rem 1.2rem;margin:1.5rem 0;background:rgba(59,130,246,.06);border-radius:0 8px 8px 0;color:#94a3b8}
.art-body pre{background:rgba(15,23,42,.8);border:1px solid var(--bd);border-radius:10px;padding:1rem 1.2rem;overflow-x:auto;font-size:.88rem}
.art-body code{background:rgba(59,130,246,.1);color:#93c5fd;padding:.15rem .4rem;border-radius:4px;font-size:.88em}
.art-body pre code{background:none;color:#94a3b8;padding:0}
.art-body hr{border-color:var(--bd);margin:2rem 0}
.art-body table{width:100%;border-collapse:collapse;margin-bottom:1.2rem}
.art-body th,.art-body td{padding:.6rem .9rem;border:1px solid var(--bd);font-size:.9rem}
.art-body th{background:rgba(30,41,59,.8);color:#e2e8f0;font-weight:600}
.btn-back{display:inline-flex;align-items:center;gap:8px;color:var(--t2);text-decoration:none;font-size:.88rem;font-weight:500;padding:.45rem .9rem;border-radius:8px;border:1px solid var(--bd);transition:all .15s}
.btn-back:hover{color:var(--t1);border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.04)}
.share-btn{display:inline-flex;align-items:center;gap:6px;color:var(--t2);background:transparent;border:1px solid var(--bd);padding:.38rem .85rem;border-radius:8px;font-size:.84rem;cursor:pointer;transition:all .15s;font-family:var(--f)}
.share-btn:hover{color:var(--t1);border-color:rgba(255,255,255,.2)}
.skeleton{background:linear-gradient(90deg,rgba(30,41,59,.6) 25%,rgba(51,65,85,.6) 50%,rgba(30,41,59,.6) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>
<nav class="navbar sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-tower-broadcast" style="-webkit-text-fill-color:#60a5fa"></i>八德資源網</a>
    <div class="d-flex align-items-center gap-1">
      <a href="/" class="nlp">首頁</a>
      <a href="/news" class="nlp on">最新消息</a>
      <a href="/news-feed" class="nlp">新聞消息</a>
      <a href="/wish" class="btn btn-sm btn-outline-primary rounded-pill px-3 ms-1" style="font-size:.83rem"><i class="fa-solid fa-wand-magic-sparkles me-1"></i>許願池</a>
    </div>
  </div>
</nav>

<div class="container" style="max-width:900px">
  <nav aria-label="breadcrumb" style="padding:.8rem 0 0">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="/"><i class="fa-solid fa-house me-1"></i>首頁</a></li>
      <li class="breadcrumb-item"><a href="/news">最新消息</a></li>
      <li class="breadcrumb-item active" id="bc-title">...</li>
    </ol>
  </nav>

  <div id="article-container" style="padding:2rem 0">
    <div class="skeleton" style="height:320px;border-radius:var(--rl);margin-bottom:2rem"></div>
    <div class="skeleton" style="height:14px;width:80px;margin-bottom:14px"></div>
    <div class="skeleton" style="height:38px;margin-bottom:10px"></div>
    <div class="skeleton" style="height:38px;width:70%;margin-bottom:20px"></div>
    <div class="skeleton" style="height:14px;margin-bottom:10px"></div>
    <div class="skeleton" style="height:14px;width:90%;margin-bottom:10px"></div>
    <div class="skeleton" style="height:14px;width:80%"></div>
  </div>
</div>

<script>
function fmtDate(s){if(!s)return '';return new Date(s).toLocaleString('zh-TW',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDateShort(s){if(!s)return '';return new Date(s).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});}

function copyLink(){
  navigator.clipboard.writeText(location.href).then(()=>{
    const btn=document.getElementById('copy-btn');
    if(btn){btn.innerHTML='<i class="fa-solid fa-check"></i>已複製';setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-link"></i>複製連結';},2000);}
  }).catch(()=>{});
}

function shareLine(title){
  window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(title),'_blank');
}

async function loadRelated(currentSlug){
  try{
    const d=await fetch('/api/announcements?limit=5').then(r=>r.json());
    const items=(d.items||[]).filter(it=>it.slug!==currentSlug).slice(0,2);
    if(!items.length)return '';
    const rows=items.map(it=>`
      <a href="/news/${it.slug}" style="text-decoration:none;display:flex;align-items:center;gap:12px;padding:1rem;background:var(--cb);border:1px solid var(--bd);border-radius:var(--rl);transition:border-color .15s" onmouseover="this.style.borderColor='rgba(59,130,246,.35)'" onmouseout="this.style.borderColor='rgba(255,255,255,.08)'">
        <div style="width:60px;height:60px;background:linear-gradient(135deg,rgba(30,41,59,.9),rgba(15,23,42,.9));border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center"><i class="fa-regular fa-newspaper" style="color:rgba(255,255,255,.2)"></i></div>
        <div><div style="font-size:.9rem;font-weight:600;color:var(--t1);margin-bottom:2px">${it.title}</div><div style="font-size:.78rem;color:var(--t4)">${fmtDateShort(it.published_at)} · ${it.category||'一般'}</div></div>
      </a>`).join('');
    return `<div style="padding-top:2rem;border-top:1px solid var(--bd)"><h3 style="font-size:1rem;font-weight:700;color:var(--t1);margin-bottom:1rem">相關消息</h3><div class="d-flex flex-column gap-3">${rows}</div></div>`;
  }catch(e){return '';}
}

async function loadArticle(){
  const slug=location.pathname.replace(/^\/news\//,'').replace(/\/$/,'');
  if(!slug){showNotFound();return;}
  try{
    const r=await fetch(`/api/announcements/${encodeURIComponent(slug)}`);
    if(!r.ok){showNotFound();return;}
    const d=await r.json();

    document.getElementById('page-title').textContent=`${d.title} — 八德資源網`;
    const desc=d.meta_description||d.summary||'';
    document.getElementById('page-desc').setAttribute('content',desc);
    document.getElementById('og-title').setAttribute('content',d.title);
    document.getElementById('og-desc').setAttribute('content',desc);
    if(d.cover_image)document.getElementById('og-image').setAttribute('content',d.cover_image);
    document.getElementById('bc-title').textContent=d.title.length>20?d.title.substring(0,20)+'…':d.title;

    const cover=d.cover_image?`<div class="art-cover"><img src="${d.cover_image}" alt="${d.title}"></div>`:`<div class="art-cover"><i class="fa-regular fa-image" style="font-size:3rem;color:rgba(255,255,255,.15)"></i></div>`;
    const updLine=d.updated_at&&d.updated_at!==d.published_at?`<span><i class="fa-solid fa-arrows-rotate me-1"></i>更新：${fmtDateShort(d.updated_at)}</span>`:'';
    const related=await loadRelated(slug);
    const titleEsc=d.title.replace(/'/g,"\\'");

    document.getElementById('article-container').innerHTML=`
      ${cover}
      <div style="max-width:720px">
        <span class="cat-badge">${d.category||'一般'}</span>
        <h1 class="art-title">${d.title}</h1>
        <div class="art-meta">
          <span><i class="fa-regular fa-calendar me-1"></i>${fmtDate(d.published_at)}</span>
          ${updLine}
          <div style="margin-left:auto;display:flex;gap:8px">
            <button class="share-btn" onclick="shareLine('${titleEsc}')"><i class="fa-brands fa-line"></i>LINE 分享</button>
            <button class="share-btn" id="copy-btn" onclick="copyLink()"><i class="fa-solid fa-link"></i>複製連結</button>
          </div>
        </div>
        <article class="art-body">${d.content||'<p class="text-secondary">（尚無內容）</p>'}</article>
        <div style="padding:2rem 0;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <a href="/news" class="btn-back"><i class="fa-solid fa-arrow-left"></i>返回最新消息</a>
          <a href="/wish" style="display:inline-flex;align-items:center;gap:6px;color:var(--pl);text-decoration:none;font-size:.88rem;font-weight:500"><i class="fa-solid fa-wand-magic-sparkles"></i>對此議題許願</a>
        </div>
        ${related}
      </div>`;
  }catch(e){showNotFound();}
}

function showNotFound(){
  document.getElementById('bc-title').textContent='找不到頁面';
  document.getElementById('article-container').innerHTML=`
    <div style="text-align:center;padding:5rem 0">
      <div style="font-size:4rem;color:#334155;margin-bottom:1rem"><i class="fa-solid fa-file-circle-question"></i></div>
      <h3 class="text-secondary fw-semibold">找不到此消息</h3>
      <p class="text-secondary mt-2">此頁面可能已移除或網址有誤</p>
      <a href="/news" class="btn btn-outline-primary mt-3 rounded-pill px-4">回最新消息列表</a>
    </div>`;
}

document.addEventListener('DOMContentLoaded',loadArticle);
</script>
<!-- LINE 浮動按鈕 -->
<a href="#" id="line-fab" title="加 LINE 好友" target="_blank" rel="noopener" style="position:fixed;bottom:28px;right:24px;z-index:999;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:#06C755;color:#fff;text-decoration:none;border-radius:50%;box-shadow:0 4px 20px rgba(6,199,85,.5);transition:all .2s"><i class="fa-brands fa-line" style="font-size:1.6rem"></i></a>
<style>#line-fab:hover{background:#05a744!important;transform:scale(1.1);box-shadow:0 6px 28px rgba(6,199,85,.65)}</style>
</body>
</html>
