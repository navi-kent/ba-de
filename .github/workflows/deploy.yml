name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/laradock/ba-de

            # 拉取最新程式（避免自動 merge 造成部署機狀態漂移）
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # 重新建置並啟動容器
            docker compose up -d --build --remove-orphans

            # 確認 web 容器就緒
            docker compose ps
            docker compose exec -T web python -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:5001/healthz', timeout=10).read().decode())"

            # 清掉未使用的舊 image
            docker image prune -f

            echo "✅ 部署完成"
